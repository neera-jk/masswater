<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css"/>

        <title>Can we ski already?</title>
    </head>
    <body>
        <div class="main_container">
            <div class="header_container">
                <div class="location_container">
                    <select name="location" id="location">
                        <option>Location</option>
                        <option value="1">Location1</option>
                        <option value="2">Location2</option>
                        <option value="3">Location3</option>
                    </select>
                </div>
                <div class="toggle_container">
                   <label class="toggle">
                    <input type="checkbox">
                    <span class="slider"></span>
                   </label>
                </div>
            </div>
            <div class="body_container">
                <div class="snow_level_marker">
                    <div class="depth_level">
                        <div class="level-10">
                            <span>70"</span>
                        </div>
                        <div class="level-10">
                            <span>60"</span>
                        </div>
                        <div class="level-10">
                            <span>50"</span>
                        </div>
                        <div class="level-10">
                            <span>40"</span>
                        </div>
                        <div class="level-10">
                            <span>30"</span>
                        </div>
                        <div class="level-10">
                            <span>20"</span>
                        </div>
                        <div class="level-10">
                            <span>10"</span>
                        </div>
                    </div>
                    <div class="snowfall_level">
                        <div class="level-10">
                            <span>10"</span>
                        </div>
                        <div class="level-10">
                            <span>9"</span>
                        </div>
                        <div class="level-10">
                            <span>8"</span>
                        </div>
                        <div class="level-10">
                            <span>7"</span>
                        </div>
                        <div class="level-10">
                            <span>6"</span>
                        </div>
                        <div class="level-10">
                            <span>5"</span>
                        </div>
                        <div class="level-10">
                            <span>4"</span>
                        </div>
                        <div class="level-10">
                            <span>3"</span>
                        </div>
                        <div class="level-10">
                            <span>2"</span>
                        </div>
                        <div class="level-10">
                            <span>1"</span>
                        </div>
                    </div>
                </div>
                <div class="head_container">
                    <h1>Snowfall level</h1>
                </div>
            </div>
        </div>
        <script src="myscript.js"></script>
    </body>
</html>
